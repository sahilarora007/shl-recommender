services:
  - type: web
    name: shl-recommender
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && python -c "from retrieval import load_index; load_index()"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
